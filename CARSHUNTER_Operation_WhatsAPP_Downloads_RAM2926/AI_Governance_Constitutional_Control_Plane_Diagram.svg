<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="600" viewBox="0 0 750 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#1b2e4b"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 5, 0 10" fill="#00e6d8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="750" height="750" fill="url(#bgGradient)"/>
  <style>
    .title { font: bold 28px 'Fira Sans', 'Segoe UI', Arial, sans-serif; fill: #00e6d8; letter-spacing: 1.5px; }
    .plane { font: bold 20px 'Fira Sans', 'Segoe UI', Arial, sans-serif; fill: #f9f871; letter-spacing: 1px; }
    .component { font: 14px 'Fira Mono', 'Menlo', 'Consolas', monospace; fill: #fff; letter-spacing: 0.5px; }
    .arrow { stroke: #00e6d8; stroke-width: 3; marker-end: url(#arrowhead); }
    .box { fill: #1b2e4b; stroke: #00e6d8; stroke-width: 2; rx: 12; }
    .evidence { fill: #000; stroke: #00e6d8; stroke-width: 2; rx: 12; }
    .evidence-text { fill: #ffd700; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 4, 0 8" fill="#1890ff"/>
    </marker>
  </defs>
  <text x="375" y="58" text-anchor="middle" class="title">AI Governance Constitutional Control Plane</text>
  <!-- Authority Plane -->
    <rect x="125" y="88" width="500" height="90" class="box"/>
    <text x="375" y="115" text-anchor="middle" class="plane">AUTHORITY PLANE</text>
    <text x="375" y="140" text-anchor="middle" class="component">BIG G (Human Authority)</text>
    <text x="375" y="165" text-anchor="middle" class="component">Governance Doctrine</text>
  <!-- Control Plane -->
    <rect x="125" y="210" width="500" height="95" class="box"/>
