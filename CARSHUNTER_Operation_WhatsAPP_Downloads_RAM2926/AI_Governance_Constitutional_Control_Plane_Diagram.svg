    <text x="375" y="270" text-anchor="middle" class="component">PMS Governance OS</text>
    <text x="375" y="300" text-anchor="middle" class="component">Runtime Authority Manager (RAM)</text>
  <!-- Decision Layer -->
    <rect x="125" y="335" width="500" height="80" class="box"/>
    <text x="375" y="360" text-anchor="middle" class="plane">DECISION LAYER</text>
    <text x="375" y="390" text-anchor="middle" class="component">ALCATARA (Decision Engine)</text>
  <!-- Execution Plane -->
    <rect x="125" y="435" width="500" height="99" class="box"/>
    <text x="375" y="465" text-anchor="middle" class="plane">EXECUTION PLANE</text>
    <text x="375" y="495" text-anchor="middle" class="component">QGED (Execution Gate)</text>
    <text x="375" y="525" text-anchor="middle" class="component">Operational Systems (Finance, Logistics, APIs)</text>
  <!-- Evidence System -->
    <rect x="75" y="600" width="600" height="69" class="evidence"/>
