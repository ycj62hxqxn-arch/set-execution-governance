  <!-- Arrows -->
  <!-- BPB Signature Footer -->
  <text x="375" y="740" text-anchor="middle" font-size="13" fill="#c9a961" font-family="Montserrat, Arial, sans-serif" font-weight="bold">BPB Solutions LTD · CANONICAL_v1.0 · 2026</text>
</svg>
