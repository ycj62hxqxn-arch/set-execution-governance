      <text x="24" y="74" fill="#ffffff" font-family="Georgia, serif" font-size="30" font-weight="700">Doctrine</text>
      <text x="24" y="106" fill="#d1c6b5" font-family="Arial, sans-serif" font-size="17">BIG G and Alcatara aligned the decision model.</text>
    </g>

    <g transform="translate(340 302)">
      <rect x="0" y="0" width="240" height="170" rx="20" fill="rgba(255,255,255,0.04)" stroke="#c6a85a"/>
      <text x="24" y="34" fill="#c6a85a" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">EXECUTION</text>
      <text x="24" y="74" fill="#ffffff" font-family="Georgia, serif" font-size="30" font-weight="700">Execution</text>
      <text x="24" y="106" fill="#d1c6b5" font-family="Arial, sans-serif" font-size="17">PMS_GOVERN and QGED framed controlled runtime action.</text>
    </g>

    <g transform="translate(610 302)">
      <rect x="0" y="0" width="240" height="170" rx="20" fill="rgba(255,255,255,0.04)" stroke="#c6a85a"/>
      <text x="24" y="34" fill="#c6a85a" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">EVIDENCE</text>
      <text x="24" y="74" fill="#ffffff" font-family="Georgia, serif" font-size="30" font-weight="700">Evidence</text>
      <text x="24" y="106" fill="#d1c6b5" font-family="Arial, sans-serif" font-size="17">Ledger and freeze-state artifacts gave the system memory.</text>
