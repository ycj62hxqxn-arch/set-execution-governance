  <text x="64" y="58" fill="#c6a85a" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="4">PUBLIC CUT / LAST 8 WEEKS</text>
  <text x="64" y="122" fill="#ffffff" font-family="Georgia, serif" font-size="48" font-weight="700">Governance became a program, not a file set</text>
  <text x="64" y="170" fill="#d1c6b5" font-family="Arial, sans-serif" font-size="20">Across eight weeks, doctrine, execution, evidence, and platform packaging moved into one operating narrative.</text>

    <g transform="translate(70 302)">
      <rect x="0" y="0" width="240" height="170" rx="20" fill="rgba(255,255,255,0.04)" stroke="#c6a85a"/>
