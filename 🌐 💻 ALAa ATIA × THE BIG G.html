<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alaa Atia — THE BIG G</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --black: #000000;
  --gold: #C6A85A;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--black);
  color: white;
  font-family: 'Inter', sans-serif;
}

section {
  min-height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
}

h1, h2 {
  font-family:'Cinzel', serif;
  color:var(--gold);
}

.hero-shell {
  width: min(100%, 680px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.hero-badge {
  width: 180px;
  height: 180px;
  padding: 14px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(198, 168, 90, 0.26), rgba(198, 168, 90, 0.06) 58%, rgba(0, 0, 0, 0.92) 100%);
  border: 1px solid rgba(198, 168, 90, 0.45);
  box-shadow:
    0 0 0 8px rgba(198, 168, 90, 0.08),
    0 22px 60px rgba(0, 0, 0, 0.55);
  display: grid;
  place-items: center;
}

.hero-mark {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 50%;
  object-fit: cover;
  object-position: center;
  background: #111;
}

.big-text {
  font-size:40px;
  max-width:800px;
}

p {
  opacity: 0.82;
  letter-spacing: 0.08em;
}

@media (max-width: 640px) {
  section {
    padding: 28px;
  }

  .hero-badge {
    width: 144px;
    height: 144px;
    padding: 10px;
  }
}

#userInput {
  width:100%;
  padding:12px;
  margin-top:20px;
  background:black;
  border:1px solid #333;
  color:white;
}

button {
  margin-top:20px;
  padding:12px 30px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
}

#log {
  margin-top:20px;
  border:1px solid #222;
  padding:15px;
  max-height:250px;
  overflow-y:auto;
  background:#050505;
  text-align:left;
}

.step { color:#C6A85A; }
.blocked { color:red; font-weight:bold; }
.approved { color:lightgreen; font-weight:bold; }
</style>
</head>
<body>
<section>
  <div class="hero-shell">
    <div class="hero-badge">
      <img
        class="hero-mark"
        src="Logos/BPB-Logo- .jpg"
        alt="BPB Solutions logo"
      />
    </div>
    <h1>A L A A</h1>
    <p>Execution Control Demo</p>
<input id="userInput" placeholder="Enter decision request..." />
<button onclick="runAI()">Execute</button>

<div id="log"></div>  </div>
</section>
<script>
async function runAI() {

  const input = document.getElementById("userInput").value.trim();
  const log = document.getElementById("log");

  log.innerHTML = "";

  if (!input) {
    log.innerHTML = "<div class='blocked'>Enter a request first</div>";
    return;
  }

  function step(text, className="step") {
    const div = document.createElement("div");
    div.className = className;
    div.innerText = "› " + text;
    log.appendChild(div);
  }

  step("Parsing input...");
  step("Applying logic engine...");
  step("Evaluating rules...");

  try {

    const res = await fetch("http://localhost:3000/execute", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ input })
    });

    const data = await res.json();

    step("Authority Gate (QGED)...");

    if (data.status === "blocked") {
      step("BLOCKED: " + data.reason, "blocked");
    } 
    else if (data.status === "flagged") {
      step("FLAGGED: " + data.reason);
    } 
    else {
      step("APPROVED", "approved");
    }

    step("Finalizing execution...");

    log.innerHTML += `
      <br>
      <div>${data.output || ""}</div>
      <div><br>Risk: ${data.risk}</div>
      <div>Confidence: ${data.confidence}</div>
    `;

  } catch (err) {
    log.innerHTML += `<div class="blocked">ERROR: ${err.message}</div>`;
  }
}
</script>
</body>
</html>
