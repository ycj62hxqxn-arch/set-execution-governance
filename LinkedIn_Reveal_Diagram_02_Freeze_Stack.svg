    <text x="180" y="123" text-anchor="middle" fill="#C9F0D7" font-family="Arial, sans-serif" font-size="18" font-weight="700">RUNTIME STATE = FREEZE</text>
    <path d="M180 146V176" stroke="#C6A85A" stroke-width="3"/>

