    <text x="180" y="297" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, serif" font-size="24" font-weight="700">LEDGER SNAPSHOT + AUDIT</text>
    <text x="180" y="322" text-anchor="middle" fill="#CFC6B6" font-family="Arial, sans-serif" font-size="16">Exact freeze ID, timestamp, workspace fingerprint</text>
