    <text x="28" y="84" fill="#FFFFFF" font-family="Georgia, serif" font-size="30" font-weight="700">One state. Four surfaces.</text>
    <text x="28" y="124" fill="#CFC6B6" font-family="Arial, sans-serif" font-size="20">If any one layer disagrees, the checkpoint is only symbolic.</text>
    <text x="28" y="158" fill="#CFC6B6" font-family="Arial, sans-serif" font-size="20">If all four layers agree, execution has a real institutional boundary.</text>
