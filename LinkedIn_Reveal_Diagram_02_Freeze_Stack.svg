    <text x="180" y="35" text-anchor="middle" fill="#F3D892" font-family="Arial, sans-serif" font-size="18" font-weight="700">TOP LEVEL FREEZE METADATA</text>
    <path d="M180 58V88" stroke="#C6A85A" stroke-width="3"/>

