<!-- BPB LinkedIn Runtime Model Slides Layout Sample -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPB LinkedIn Runtime Model Slides — Layout Sample</title>
  <style>
    :root {
      --bg:    #0d2b2e;
      --deep:  #0f3033;
      --panel: #133438;
      --card:  #1a3a52;
      --mid:   #1e4260;
      --teal:  #d4af37;
      --teal2: #f2cc8f;
      --blue:  #3498db;
      --gold:  #d4af37;
      --gold2: #f2cc8f;
      --green: #27ae60;
      --red:   #e74c3c;
      --white: #ffffff;
      --dim:   rgba(255,255,255,0.68);
    }
    html, body { background: var(--bg); color: var(--white); font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
    .slide { width: 1200px; height: 628px; margin: 40px auto; background: var(--card); border-radius: 18px; box-shadow: 0 6px 32px #0008; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .slide-title { font-size: 2.2em; font-weight: 900; color: var(--gold); margin-bottom: 18px; }
    .slide-desc { font-size: 1.2em; color: var(--white); margin-bottom: 24px; }
    .slide-badge { background: var(--teal2); color: var(--bg); padding: 0.4em 1.2em; border-radius: 1.2em; font-weight: bold; font-size: 1.1em; margin-bottom: 18px; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-badge">BPB LinkedIn</div>
    <div class="slide-title">Runtime Model Slides</div>
    <div class="slide-desc">This is a visual sample of the BPB LinkedIn Runtime Model Slides layout. Use this as a reference for categorization, editing, or deletion.</div>
  </div>
</body>
</html>
