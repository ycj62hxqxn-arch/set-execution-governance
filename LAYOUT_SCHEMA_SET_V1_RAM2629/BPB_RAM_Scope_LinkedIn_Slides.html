<!-- BPB RAM Scope LinkedIn Slides Layout Sample -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPB RAM Scope LinkedIn Slides — Layout Sample</title>
  <style>
    body { font-family: 'Montserrat', Arial, sans-serif; background: #1a1a2e; color: #fff; margin: 0; }
    .slide { width: 900px; height: 506px; margin: 40px auto; background: #23234a; border-radius: 18px; box-shadow: 0 6px 32px #0008; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
    .ram-badge { background: #c9a961; color: #23234a; display: inline-block; padding: 0.3em 1.2em; border-radius: 1.2em; font-weight: bold; font-size: 1.1em; margin-bottom: 18px; letter-spacing: 0.04em; }
    .logo { position: absolute; top: 32px; right: 40px; font-size: 1.2em; color: #c9a961; font-weight: bold; letter-spacing: 0.06em; }
    h1 { font-size: 2.6em; letter-spacing: 0.03em; color: #c9a961; margin: 0 0 18px 0; }
    .content { font-size: 1.25em; max-width: 700px; text-align: center; margin-bottom: 30px; }
    .bpb-footer { position: absolute; bottom: 24px; left: 0; width: 100%; text-align: center; color: #c9a961; font-size: 1.1em; font-weight: bold; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="logo">BPB Solutions LTD</div>
    <span class="ram-badge">RAM SCOPE</span>
    <h1>BPB RAM Scope LinkedIn Slides</h1>
    <div class="content">This is a visual sample of the BPB RAM Scope LinkedIn Slides layout. Use this as a reference for categorization, editing, or deletion.</div>
    <div class="bpb-footer">BPB RAM Scope Layout</div>
  </div>
</body>
</html>
