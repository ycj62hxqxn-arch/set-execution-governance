<!-- CARSHUNTER GTC4u Augmented Governance Internal Slides (Branded) Layout Sample -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTC4u Augmented Governance Internal Slides — Layout Sample</title>
  <style>
    :root {
      --bg: #0e0e1a;
      --deep: #1a1a2e;
      --mid: #2a2a3e;
      --gold: #c9a961;
      --white: #ffffff;
      --muted: rgba(255,255,255,0.45);
      --dim: rgba(255,255,255,0.22);
      --green: #27ae60;
      --red: #c0392b;
      --blue: #3498db;
    }
    html, body { width: 100%; height: 100%; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--white); }
    #slides { width: 100%; min-height: 100vh; position: relative; }
    .slide { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 90px; min-height: 100vh; text-align: center; }
    .title-slide { background: radial-gradient(ellipse at 25% 55%, #2a1a3e 0%, var(--bg) 65%); }
    .slide-label { font-size: 0.7em; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; font-weight: 700; }
  </style>
</head>
<body>
  <div id="slides">
    <div class="slide title-slide">
      <div class="slide-label">CARSHUNTER</div>
      <h1>GTC4u Augmented Governance Internal Slides</h1>
      <p>This is a visual sample of the CARSHUNTER GTC4u Augmented Governance Internal Slides (Branded) layout. Use this as a reference for categorization, editing, or deletion.</p>
    </div>
  </div>
</body>
</html>
