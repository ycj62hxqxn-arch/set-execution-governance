<!-- BPB Governance Architecture Reveal Layout Sample -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPB Governance Architecture Reveal — Layout Sample</title>
  <style>
    :root {
      --bg:     #0e0e1a;
      --deep:   #1a1a2e;
      --mid:    #2a2a3e;
      --gold:   #c9a961;
      --gold-lt:#e8cg82;
      --white:  #ffffff;
      --muted:  rgba(255,255,255,0.45);
      --dim:    rgba(255,255,255,0.22);
      --green:  #27ae60;
      --red:    #c0392b;
      --blue:   #3498db;
      --warn:   #e67e22;
    }
    html, body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; }
    .container { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
    .brand-header { text-align: center; margin-bottom: 38px; }
    .brand-header h1 { font-size: 2.8em; font-weight: 800; color: var(--gold); margin-bottom: 12px; }
    .brand-header h2 { font-size: 1.4em; color: var(--white); margin-bottom: 8px; }
    .gold-line { width: 54px; height: 4px; background: linear-gradient(90deg, var(--gold), #f0d890); border-radius: 2px; margin: 0 auto 22px; }
    .sample-content { background: rgba(201,169,97,0.07); border-left: 4px solid var(--gold); padding: 24px 32px; border-radius: 8px; font-size: 1.1em; color: rgba(255,255,255,0.82); }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-header">
      <h1>BPB Governance Architecture Reveal</h1>
      <h2>Layout Sample</h2>
      <div class="gold-line"></div>
    </div>
    <div class="sample-content">
      <p>This is a visual sample of the BPB Governance Architecture Reveal layout. Use this as a reference for categorization, editing, or deletion.</p>
    </div>
  </div>
</body>
</html>
