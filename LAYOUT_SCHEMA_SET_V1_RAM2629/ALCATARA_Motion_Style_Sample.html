<!-- ALCATARA Motion Style Layout Sample -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALCATARA Motion Style — Layout Sample</title>
  <style>
    body { background: #0e0e1a; color: #fff; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; }
    .container { max-width: 700px; margin: 60px auto; padding: 40px 32px; background: rgba(26,127,212,0.08); border-radius: 18px; box-shadow: 0 4px 24px #0004; }
    .alcatara-node {
      background: rgba(26,127,212,0.15);
      border: 2px solid rgba(26,127,212,0.4);
      color: #6ec0ff;
      font-size: 1.5em;
      font-weight: 900;
      letter-spacing: 2px;
      border-radius: 12px;
      padding: 32px 0;
      text-align: center;
      margin-bottom: 32px;
      box-shadow: 0 2px 12px rgba(26,127,212,0.10);
    }
    .desc { color: #c9a961; font-size: 1.1em; text-align: center; margin-bottom: 18px; }
    .footer { color: #6ec0ff; text-align: center; font-size: 1em; margin-top: 44px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="alcatara-node">ALCATARA<br>Decision Engine Node</div>
    <div class="desc">This is a visual sample of the ALCATARA Motion style as applied to decision nodes and layers in governance architecture diagrams. Use this as a reference for categorization, editing, or deletion.</div>
    <div class="footer">ALCATARA Motion Style Layout Sample</div>
  </div>
</body>
</html>
