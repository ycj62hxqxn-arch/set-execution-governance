name: SET Compliance Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  set-check:
    name: SET Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Validate SET claim
        run: |
          test -f SET-CLAIM.json || (echo "Missing SET-CLAIM.json" && exit 1)

      - name: Enforce SET compliance
        run: |
          if ! grep -q '"set_compliant": true' SET-CLAIM.json; then
            echo "❌ SET compliance is not true"
            exit 1
          fi

          if ! grep -q '"set_version": "1.0"' SET-CLAIM.json; then
            echo "❌ Invalid SET version"
            exit 1
          fi

          echo "✅ SET enforcement passed"
