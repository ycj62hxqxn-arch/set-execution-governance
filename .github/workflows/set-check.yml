name: SET Compliance Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  set-check:
    name: SET Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Validate SET claim
        run: |
          test -f SET-CLAIM.json || (echo "Missing SET-CLAIM.json" && exit 1)

      - name: Enforce execution governance
        run: |
          echo "SET compliance verified"
