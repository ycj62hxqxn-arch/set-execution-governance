name: SET Compliance Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  set-check:
    name: SET Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Debug files
        run: |
          echo "=== FILES IN RUNNER ==="
          ls -la

      - name: Validate SET claim
        run: |
          test -f SET-CLAIM.json || (echo "❌ Missing SET-CLAIM.json" && exit 1)
