name: SET Compliance Check

on:
  pull_request:
   : [ main ]

jobs:
  set-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}

      - name: Validate SET claim
        run: |
          test -f SET-CLAIM.json || (echo "Missing SET-CLAIM.json" && exit 1)
